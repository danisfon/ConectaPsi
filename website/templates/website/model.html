{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ConectaPsi{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="{% url 'index' %}">
            🧠 ConectaPsi
        </a>

        <!-- Botão mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">
                        <i class="bi bi-house"></i> Início
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'sobre' %}">
                        <i class="bi bi-info-circle"></i> Sobre
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contato' %}">
                        <i class="bi bi-envelope"></i> Contato
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- ================= CONTEÚDO ================= -->
<main class="container mt-4">

    {% block conteudo %}
    <!-- conteúdo das páginas -->
    {% endblock %}

</main>

<!-- ================= FOOTER ================= -->
<footer class="bg-light text-center py-3 mt-5">
    <small>
        © 2026 ConectaPsi - Sistema de Agendamento Psicológico
    </small>
</footer>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
